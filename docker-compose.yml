services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: pavageau
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pavageau"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      network: host
      args:
        SUPABASE_URL: ${SUPABASE_URL:-}
    env_file:
      - .env
    environment:
      AWS_REGION: sa-east-1
      DATABASE_URL: postgresql://postgres:postgres@db:5432/pavageau
      MIGRATION_DATABASE_URL: postgresql://postgres:postgres@db:5432/pavageau
      RADAR_DB_URL: postgresql://radar_worker:radar_worker@db:5432/pavageau
      VAULT_PROVIDER: memory
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  db_data:
