# secrets-manifest.yaml — metadata ONLY. No secret values, ever.
# The OS uses this to know which env-var names exist, why, and where.
# Per-project secrets are appended by the environment/security plans.
secrets:
  - name: GITHUB_TOKEN
    purpose: Authenticate GitHub MCP and gh CLI for repository/PR operations.
    required_environment: [local, development]
    consumer: planning + implementation (git operations)
    required_for_local: false
    required_for_production: false
    rotation_notes: Rotate via GitHub settings; store in local .env or secret store.
  - name: DATABASE_URL
    purpose: Primary database connection string (read-only MCP tools by default).
    required_environment: [local, test, development, staging, production]
    consumer: backend + database-migration-builder
    required_for_local: true
    required_for_production: true
    rotation_notes: Rotate via database provider; never commit; never log.
  - name: SESSION_SECRET
    purpose: Sign/verify sessions when authentication is required by a project.
    required_environment: [development, staging, production]
    consumer: auth-authorization-builder
    required_for_local: false
    required_for_production: true
    rotation_notes: Provision via secret store; rotate on suspected compromise.
