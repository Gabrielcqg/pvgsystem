name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pavageau
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pavageau"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:54329/pavageau
      MIGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:54329/pavageau
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python3 scripts/validate_plan_package.py plans/active/pavageau-sistema-integrado-backend
      - run: python3 scripts/scan_secrets.py
      - run: python -m app.db.migrate
      - run: python -m pytest -q -m "scraper or config or schema or calc or api or radar or security or loader or docs"
