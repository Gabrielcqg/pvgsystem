# Completion gates — Codex must not declare success because files were created.
# A failed gate reopens the relevant tasks. Gates marked required_when_* are
# conditionally required based on plan facts (has_database, has_auth, has_ui,
# has_ai, lint_configured, types_applicable).
#
# Gates are grouped by phase (see gate_phase below):
#   planning       — satisfied by Claude at the end of /plan_max (the plan is
#                    complete, audited, and handed off). These may be PASS while
#                    implementation has not started.
#   implementation — MUST begin PENDING and may only become PASS when Codex
#                    proves them with evidence. A plan validator fails if any
#                    implementation gate is marked PASS before implementation
#                    (see scripts/validate_plan_package.py gate-state check).
completion_gates:
  # --- planning-phase gates (Claude marks these PASS at end of /plan_max) ---
  active_plan_valid: required
  planning_package_complete: required
  independent_plan_audit_passed: required
  codex_handoff_valid: required

  # --- implementation-phase gates (PENDING until Codex proves them) ---
  product_requirements_implemented: required
  requirement_traceability_complete: required
  frontend_implemented: required_when_ui_exists
  backend_implemented: required
  database_implemented: required_when_database_exists
  authentication_implemented: required_when_auth_exists
  real_ai_integration_verified: required_when_ai_exists
  acceptance_criteria_passed: required
  build_passed: required
  lint_passed: required_when_configured
  typecheck_passed: required_when_applicable
  unit_tests_passed: required
  integration_tests_passed: required_when_applicable
  contract_tests_passed: required_when_applicable
  database_tests_passed: required_when_database_exists
  migration_validation_passed: required_when_database_exists
  auth_tests_passed: required_when_auth_exists
  authorization_tests_passed: required_when_auth_exists
  e2e_tests_passed: required_when_ui_exists
  browser_validation_passed: required_when_ui_exists
  accessibility_validation_passed: required_when_ui_exists
  frontend_experience_review_passed: required_when_ui_exists
  ai_evaluations_passed: required_when_ai_exists
  security_review_passed: required
  performance_review_passed: required
  observability_verified: required_when_applicable
  production_like_run_verified: required
  documentation_complete: required
  deviation_report_complete: required
  external_blockers_documented: required
  final_acceptance_judge_passed: required

# Semantics used by scripts/evaluate_completion_gates.py
gate_semantics:
  required: must be PASS to complete
  required_when_configured: PASS or N/A(if the tool/command is not configured)
  required_when_applicable: PASS or N/A(if not applicable to this plan)
  required_when_database_exists: PASS when plan.has_database else N/A
  required_when_auth_exists: PASS when plan.has_auth else N/A
  required_when_ui_exists: PASS when plan.has_ui else N/A
  required_when_ai_exists: PASS when plan.has_ai else N/A

# Phase classification. Planning gates are satisfied during /plan_max;
# implementation gates MUST be PENDING in a freshly-planned package.
gate_phase:
  planning:
    - active_plan_valid
    - planning_package_complete
    - independent_plan_audit_passed
    - codex_handoff_valid
  implementation:
    - product_requirements_implemented
    - requirement_traceability_complete
    - frontend_implemented
    - backend_implemented
    - database_implemented
    - authentication_implemented
    - real_ai_integration_verified
    - acceptance_criteria_passed
    - build_passed
    - lint_passed
    - typecheck_passed
    - unit_tests_passed
    - integration_tests_passed
    - contract_tests_passed
    - database_tests_passed
    - migration_validation_passed
    - auth_tests_passed
    - authorization_tests_passed
    - e2e_tests_passed
    - browser_validation_passed
    - accessibility_validation_passed
    - frontend_experience_review_passed
    - ai_evaluations_passed
    - security_review_passed
    - performance_review_passed
    - observability_verified
    - production_like_run_verified
    - documentation_complete
    - deviation_report_complete
    - external_blockers_documented
    - final_acceptance_judge_passed

gate_states: [PASS, FAIL, NA, PENDING]
