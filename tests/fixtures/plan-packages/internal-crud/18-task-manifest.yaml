  - id: TASK-006
    title: Acceptance + QA
    objective: Verify all acceptance criteria with evidence.
    requirements:
      - FR-001
      - FR-002
      - FR-003
      - FR-004
      - FR-005
    dependencies:
      - TASK-004
      - TASK-005
    assigned_agent: qa-test-validator
    required_skills:
      - acceptance-criteria-validation
      - integration-test-loop
